- name: Client Domain Configuration
  hosts: cl01
  gather_facts: false
  become: true
  become_method: runas
  become_user: student

  vars:
    domain_name: blueteamlab.local
    dc_dns_ip: "10.10.10.20"
    client_dns_adapter: "Ethernet 2"
    domain_join_user: "BLUETEAMLAB\\student"
    domain_join_password: "Team123!"

  tasks:
    - name: Set DNS to DC
      ansible.windows.win_dns_client:
        adapter_names:
          - "{{ client_dns_adapter }}"
        ipv4_addresses:
          - "{{ dc_dns_ip }}"

    - name: Verify DC can be discovered
      ansible.windows.win_shell: |
        nltest /dsgetdc:{{ domain_name }}
      register: dc_check
      changed_when: false

    - name: Show DC discovery output
      ansible.builtin.debug:
        var: dc_check.stdout

    - name: Join domain
      ansible.windows.win_domain_membership:
        dns_domain_name: "{{ domain_name }}"
        domain_admin_user: "{{ domain_join_user }}"
        domain_admin_password: "{{ domain_join_password }}"
        state: domain
      register: domain_join

    - name: Reboot after domain join
      ansible.windows.win_reboot:
        msg: "Rebooting after domain join"
        reboot_timeout: 3600
      when: domain_join.reboot_required | default(true)
