- name: AD Configuration on Domain Controller
  hosts: dc01
  gather_facts: false
  become: true
  become_method: runas
  become_user: student

  vars:
    domain_name: "blueteamlab.local"
    domain: "DC=blueteamlab,DC=local"

    domain_admin_user: "BLUETEAMLAB\\student"
    domain_admin_password: "Team123!"

    ous:
      - { name: "Servers",         path: "{{ domain }}" }
      - { name: "Clients",         path: "{{ domain }}" }
      - { name: "LabUsers",        path: "{{ domain }}" }
      - { name: "ServiceAccounts", path: "{{ domain }}" }

    user_ou: "OU=LabUsers,{{ domain }}"
    svc_ou: "OU=ServiceAccounts,{{ domain }}"

    new_user:
      name: "blueuser"
      firstname: "Blue"
      surname: "User"
      display_name: "Blue User"
      upn: "blueuser@blueteamlab.local"
      password: "Team123!"
      groups_add:
        - "Domain Users"

    service_account:
      name: "svc-http"
      display_name: "HTTP Service Account"
      upn: "svc-http@blueteamlab.local"
      password: "Team123!"
      spns_add:
        - "HTTP/log01.blueteamlab.local"
        - "HTTP/log01"

  tasks:
    - name: Ensure OUs exist
      microsoft.ad.ou:
        name: "{{ item.name }}"
        path: "{{ item.path }}"
        state: present
        domain_username: "{{ domain_admin_user }}"
        domain_password: "{{ domain_admin_password }}"
      loop: "{{ ous }}"

    - name: Create new user
      microsoft.ad.user:
        name: "{{ new_user.name }}"
        firstname: "{{ new_user.firstname }}"
        surname: "{{ new_user.surname }}"
        display_name: "{{ new_user.display_name }}"
        upn: "{{ new_user.upn }}"
        password: "{{ new_user.password }}"
        path: "{{ user_ou }}"
        enabled: true
        state: present
        domain_username: "{{ domain_admin_user }}"
        domain_password: "{{ domain_admin_password }}"
        groups:
          add: "{{ new_user.groups_add }}"

    - name: Create service account
      microsoft.ad.user:
        name: "{{ service_account.name }}"
        display_name: "{{ service_account.display_name }}"
        upn: "{{ service_account.upn }}"
        password: "{{ service_account.password }}"
        path: "{{ svc_ou }}"
        enabled: true
        state: present
        domain_username: "{{ domain_admin_user }}"
        domain_password: "{{ domain_admin_password }}"
        spn:
          add: "{{ service_account.spns_add }}"

    - name: Enable audit policies - Logon
      ansible.windows.win_shell: |
        auditpol /set /subcategory:"Logon" /success:enable /failure:enable
      changed_when: false

    - name: Enable audit policy - Kerberos Service Ticket Operations
      ansible.windows.win_shell: |
        auditpol /set /subcategory:"Kerberos Service Ticket Operations" /success:enable /failure:enable
      changed_when: false

    - name: Enable audit policy - Directory Service Access
      ansible.windows.win_shell: |
        auditpol /set /subcategory:"Directory Service Access" /success:enable /failure:enable
      changed_when: false
